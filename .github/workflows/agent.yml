name: ZeroAgent Autonomous Cycle

on:
  workflow_dispatch:
    inputs:
      vehicle:
        description: 'Force a specific vehicle (content_affiliate, bounty_hunting)'
        type: string
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no publishing)'
        type: boolean
        required: false
        default: false

# Required permissions for git push + self-trigger (dispatch next cycle)
permissions:
  contents: write
  actions: write

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 35  # 30-min sleep + ~5 min for agent

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache memory and logs
        uses: actions/cache@v4
        with:
          path: |
            memory/
            logs/
          key: ${{ runner.os }}-agent-state-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-agent-state-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TaskMarket CLI
        run: npm install -g @lucid-agents/taskmarket@0.6.4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent cycle
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          DEVTO_API_KEY:      ${{ secrets.DEVTO_API_KEY }}
          LINKSTERR_API_KEY:  ${{ secrets.LINKSTERR_API_KEY }}
          NVIDIA_API_KEY:     ${{ secrets.NVIDIA_API_KEY }}
          TASKMARKET_KEYSTORE: ${{ secrets.TASKMARKET_KEYSTORE }}
        run: |
          ARGS=""
          if [ "${{ inputs.vehicle }}" != "" ]; then
            ARGS="--vehicle ${{ inputs.vehicle }}"
          fi
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python main.py $ARGS

      - name: Commit memory and logs
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "ZeroAgent"
          git config user.email "agent@zero.local"
          git add memory/ logs/ || true
          git diff --staged --quiet || git commit -m "Agent state $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || echo "Push failed — likely no changes to push"

      - name: Schedule next cycle in 30 minutes
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          # Sleep to maintain 30-min cycle spacing
          sleep 1800
          # Dispatch the next run
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/agent.yml/dispatches \
            -d '{"ref":"main"}'
